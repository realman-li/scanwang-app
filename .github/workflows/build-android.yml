# .github/workflows/build-android.yml
name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3-pip openjdk-11-jdk \
        zlib1g-dev libncurses5-dev libstdc++6 \
        libffi-dev libssl-dev libbz2-dev libsqlite3-dev libxml2-dev libxslt1-dev \
        libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev liblcms2-dev \
        libwebp-dev libharfbuzz-dev libfribidi-dev libxcb1-dev
        
    - name: Install Android SDK
      run: |
        # 创建唯一路径
        SDK_DIR=$PWD/android-sdk-$(date +%s)
        mkdir -p $SDK_DIR
        
        # 下载 SDK 命令行工具
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools $SDK_DIR
        
        # 安装必要的 SDK 组件
        $SDK_DIR/cmdline-tools/bin/sdkmanager --sdk_root=$SDK_DIR \
        "build-tools;34.0.0" "platform-tools" "platforms;android-34" "ndk;23.0.7599858"
        
        # 设置环境变量
        echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$SDK_DIR/cmdline-tools/ndk/23.0.7599858" >> $GITHUB_ENV
        echo "PATH=$PATH:$SDK_DIR/cmdline-tools/platform-tools" >> $GITHUB_ENV
        
    - name: Verify requirements file
      run: |
        ls -la
        if [ ! -f "requirements.txt" ]; then
          echo "Error: requirements.txt not found in ${{ github.workspace }}"
          echo "Please ensure requirements.txt is in the root of your repository"
          exit 1
        fi
        
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.4.0
        pip install -r requirements.txt
        
    - name: Build APK
      run: |
        buildozer -v android debug
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        if-no-files-found: error
