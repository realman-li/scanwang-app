# .github/workflows/build-apk.yml
name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3-pip openjdk-11-jdk \
        android-sdk android-ndk zlib1g-dev libncurses5-dev libstdc++6 \
        libffi-dev libssl-dev libbz2-dev libsqlite3-dev libxml2-dev libxslt1-dev \
        libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev liblcms2-dev \
        libwebp-dev libharfbuzz-dev libfribidi-dev libxcb1-dev
        
    - name: Set up environment variables
      run: |
        echo "JAVA_HOME=$(dirname $(dirname $(dirname $(readlink -f $(which java)))))" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=/usr/lib/android-ndk" >> $GITHUB_ENV
        
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.4.0
        pip install kivy==2.2.1 opencv-python-headless==4.8.1.78 imutils==0.5.4 \
        numpy==1.24.3 scikit-image==0.21.0 plyer==2.1.0 androidstorage4kivy==1.1.0
        
    - name: Verify buildozer.spec
      run: |
        if [ ! -f buildozer.spec ]; then
          echo "Error: buildozer.spec file is missing!"
          echo "Please create a valid buildozer.spec file with the correct INI format."
          echo "Example:"
          echo "[app]"
          echo "title = Your App Name"
          echo "package.name = yourpackagename"
          echo "package.domain = org.example"
          echo "source.dir = ."
          echo ""
          echo "[python]"
          echo "requirements = kivy==2.2.1,opencv-python-headless==4.8.1.78,imutils==0.5.4,numpy==1.24.3,scikit-image==0.21.0,plyer==2.1.0,androidstorage4kivy==1.1.0"
          echo ""
          echo "[android]"
          echo "permissions = CAMERA,INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE"
          echo "api = 31"
          echo "minapi = 21"
          echo "ndk = 23b"
          exit 1
        fi
        
    - name: Build APK
      run: |
        # 确保 buildozer.spec 有正确权限
        chmod +x buildozer.spec
        buildozer -v android debug
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        if-no-files-found: error
