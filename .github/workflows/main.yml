# .github/workflows/build-apk.yml
name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3-pip openjdk-11-jdk \
        zlib1g-dev libncurses5-dev libstdc++6 \
        libffi-dev libssl-dev libbz2-dev libsqlite3-dev libxml2-dev libxslt1-dev \
        libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev liblcms2-dev \
        libwebp-dev libharfbuzz-dev libfribidi-dev libxcb1-dev
        
    - name: Install Android SDK
      run: |
        # 下载 SDK 命令行工具
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip
        mkdir -p $ANDROID_SDK_ROOT
        mv tools $ANDROID_SDK_ROOT
        
        # 安装必要的 SDK 组件
        $ANDROID_SDK_ROOT/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
        "build-tools;34.0.0" "platform-tools" "platforms;android-34" "ndk;23.0.7599858"
        
    - name: Set up environment variables
      run: |
        echo "JAVA_HOME=$(dirname $(dirname $(dirname $(readlink -f $(which java)))))" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$PWD/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$PWD/android-sdk/ndk/23.0.7599858" >> $GITHUB_ENV
        echo "PATH=$PATH:$PWD/android-sdk/platform-tools" >> $GITHUB_ENV
        
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.4.0
        pip install kivy==2.2.1 opencv-python-headless==4.8.1.78 imutils==0.5.4 \
        numpy==1.24.3 scikit-image==0.21.0 plyer==2.1.0 androidstorage4kivy==1.1.0
        
    - name: Build APK
      run: |
        buildozer -v android debug
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        if-no-files-found: error
