name: 打包文档扫描仪APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Python 与依赖
        run: |
          python -m pip install --upgrade pip
          pip install buildozer

      - name: 生成 buildozer 配置文件
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = 文档扫描仪
package.name = docscanner
package.domain = org.scan
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0

requirements = python3,kivy==2.2.1,opencv-python==4.8.0.76,numpy,imutils,scikit-image,plyer,androidstorage4kivy

android.api = 33
android.ndk = 25b
android.sdk = 24.0.0
android.arch = arm64-v8a
android.permissions = CAMERA,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,READ_MEDIA_IMAGES
android.minapi = 24
fullscreen = 0
orientation = portrait
log_level = 2
EOF

      - name: 执行打包
        run: buildozer android debug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 文档扫描仪-安卓APK
          path: bin/*.apk
