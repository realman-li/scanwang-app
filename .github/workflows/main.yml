name: 自动打包ScanWang-Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .  # 确保在项目根目录执行
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖（含C编译环境）
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3-pip build-essential libssl-dev libffi-dev \
            python3-dev python3-setuptools gcc g++ cython3  # 重点添加：cython3、build-essential
          sudo apt-get install -y libxml2-dev libxslt1-dev zlib1g-dev unzip openjdk-17-jdk

      - name: 安装Buildozer
        run: pip install buildozer

      - name: 检查配置文件
        run: |
          if [ ! -f "buildozer.spec" ]; then
            echo "错误：未找到buildozer.spec文件"
            exit 1
          fi

      - name: 执行APK打包
        run: buildozer --verbose android_new debug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: scanwang-app-debug
          path: ./.buildozer/android/platform/android_new/*/bin/*.apk
          retention-days: 14
